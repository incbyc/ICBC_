        }

        function lookupIcbcRegistry(slug, siteName) {
            var key = String(slug || '').trim().toLowerCase();
            if (key && icbcSiteRegistry[key]) return icbcSiteRegistry[key];
            var fromName = slugifyForApi(siteName);
            if (fromName && icbcSiteRegistry[fromName]) return icbcSiteRegistry[fromName];
            return null;
        }

        function addIcbcMarkerFromSite(site) {
            var lat = parseMapCoord(site.latitude);
            var lng = parseMapCoord(site.longitude);
            if (isNaN(lat) || isNaN(lng)) return false;

            var slug = String(site.slug || '').trim().toLowerCase();
            if (!slug) return false;

            var props = supabaseSiteToProps(site);
            props._slug = slug;
            var existing = lookupIcbcRegistry(slug, site.name);
            if (existing && existing.layer && typeof existing.layer.setLatLng === 'function') {
                existing.layer.setLatLng([lat, lng]);
                existing.latlng = existing.layer.getLatLng();
                mergeSupabaseSiteProps(existing.props, props);
                existing.siteName = site.name || existing.siteName;
                existing.region = site.region || '';
                existing.siteSlug = slug;
                return false;
            }

            var latlng = L.latLng(lat, lng);
            var marker = L.marker(latlng, {
                pane: 'pane_ICBCSites_6',
                icon: icbcMarkerIcon
            });
            marker.feature = {
                type: 'Feature',
                properties: props,
                geometry: { type: 'Point', coordinates: [lng, lat] }
            };
            pop_ICBCSites_6(marker.feature, marker);
            var siteName = site.name || '';
            bindPermanentSiteTooltip(
                marker,
                siteName ? '<div>' + escapeHtml(siteName) + '</div>' : '',
                icbcSiteTooltipOptions(),
                'icbc',
                props
            );
            layer_icbcExtraSites.addLayer(marker);
            labels.push(marker);
            totalMarkers += 1;
            marker.added = true;
            addLabel(marker, labels.length - 1);
            ensureIcbcCatchment(site);
            return true;
        }

        function mergeIcbcSiteRows(rows) {
            if (!rows || !rows.length) return 0;
            var added = 0;
            rows.forEach(function (site) {
                if (addIcbcMarkerFromSite(site)) added += 1;
                else ensureIcbcCatchment(site);
            });
            return added;
        }

        function syncCatchmentsForStaticIcbcSites() {
            if (!json_ICBCSites_6 || !json_ICBCSites_6.features) return 0;
            var added = 0;
            json_ICBCSites_6.features.forEach(function (feature) {
                var coords = feature.geometry && feature.geometry.coordinates;
                var props = feature.properties || {};
                if (!coords || coords.length < 2) return;
                if (ensureIcbcCatchment({
                    name: props['Site Name'] || '',
                    latitude: coords[1],
                    longitude: coords[0],
                    region: props.Region || ''
                })) {
                    added += 1;
                }
            });
            return added;
        }

        function mergeAllIcbcSites() {
            return mergeSupabaseIcbcSites()
                .then(function (supabaseAdded) {
                    return mergeSeedCsvIcbcSites().then(function (csvAdded) {
                        var staticCatchments = syncCatchmentsForStaticIcbcSites();
                        var total = supabaseAdded + csvAdded;
                        if (total > 0 || staticCatchments > 0) {
                            refreshSiteNameLabelsBurst();
                            loadStaffSearchIndex();
                            loadSiteProfilesSeed();
                            loadSiteWeeklyMetricsSeed();
                            loadRainfallSeed();
                            console.info(
                                '[ICBC map] Added ' + total + ' site marker(s) from Supabase / seed CSV.'
                            );
                            if (staticCatchments > 0) {
                                console.info(
                                    '[ICBC map] Generated ' + staticCatchments + ' missing 7 km catchment(s).'
                                );
                            }
                        }
                        return total;
                    });
                });
        }

        function mergeSupabaseIcbcSites() {
            return supabaseRest(
                'icbc_sites?select=slug,name,region,latitude,longitude,about,projects,water_source,year_constructed,site_link,video_url&order=name'
            )
                .then(function (rows) {
                    return mergeIcbcSiteRows(rows);
                })
                .catch(function (err) {
                    console.warn('[ICBC map] Could not load ICBC sites from Supabase:', err);
                    return 0;
                });
        }

        function mergeSeedCsvIcbcSites() {
            return fetch('supabase/seed/icbc_sites.csv')
                .then(function (res) {
                    if (!res.ok) throw new Error('icbc_sites.csv not found');
                    return res.text();
                })
                .then(function (text) {
                    var rows = parseCsvRows(text);
                    if (rows.length < 2) return 0;
                    var headers = rows[0];
                    var hi = {};
                    var c;
                    for (c = 0; c < headers.length; c++) {
                        hi[headers[c].trim()] = c;
                    }
                    var sites = [];
                    var r;
                    for (r = 1; r < rows.length; r++) {
                        var cells = rows[r];
                        if (!cells || !cells.length) continue;
                        var slug = (cells[hi.slug] || '').trim();
                        if (!slug) continue;
                        sites.push({
                            slug: slug,
                            name: cells[hi.name] || '',
                            region: cells[hi.region] || '',
                            latitude: cells[hi.latitude],
                            longitude: cells[hi.longitude],
                            about: cells[hi.about] || '',
                            projects: cells[hi.projects] || '',
                            water_source: cells[hi.water_source] || '',
                            year_constructed: cells[hi.year_constructed] || '',
                            site_link: cells[hi.site_link] || '',
                            video_url: cells[hi.video_url] || ''
                        });
                    }
                    return mergeIcbcSiteRows(sites);
                })
                .catch(function (err) {
                    console.warn('[ICBC map] Could not load ICBC sites from seed CSV:', err);
                    return 0;
                });
        }

        var layer_ICBCSites_6 = new L.geoJson(json_ICBCSites_6, {
            attribution: '',
            interactive: true,
            pane: 'pane_ICBCSites_6',
            onEachFeature: pop_ICBCSites_6,
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, { icon: icbcMarkerIcon });
            },
        });
        layer_icbcAllSites = L.featureGroup([layer_ICBCSites_6, layer_icbcExtraSites]);
        bounds_group.addLayer(layer_ICBCSites_6);
        bounds_group.addLayer(layer_icbcExtraSites);
        map.addLayer(layer_icbcAllSites);

        function updateICBCLabelColor(isSatellite) {
            [layer_ICBCSites_6, layer_icbcExtraSites, layer_CMS_5, layer_Roads_4].forEach(function (group) {
                group.eachLayer(function (layer) {
                    var tip = layer.getTooltip ? layer.getTooltip() : null;
                    var el = tip ? tip.getElement() : null;
                    if (el) {
                        el.classList.remove('white-label');
                    }
                });
            });
        }

        var layer_HomeSites = new L.geoJson(json_HomeSites, {
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, {
                    icon: L.icon({
                        iconUrl: resolvePublicAssetUrl('markers/house-icon.svg'),
                        iconSize: [25, 25],
                        iconAnchor: [12, 25],
                        tooltipAnchor: [0, -25],
                        className: 'bubele-marker-icon'
                    })
                });
            },
            onEachFeature: function (feature, layer) {
                layer.on({
                    mouseout: function(e) {
                        for (i in e.target._eventParents) {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    },
                    mouseover: highlightFeature,
                });
                bindSidebarClick(layer, 'bubele', feature.properties);
            }
        });
        map.addLayer(layer_HomeSites);

        var title = new L.Control();
        title.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info leaflet-control');
            div.innerHTML = '<img src="' + resolvePublicAssetUrl('markers/CMLogo.svg') +
                '" alt="Logo"><h1>ICBC Sites Eswatini</h1>';
            return div;
        };
        title.addTo(map);

        var mapSearchHost = L.DomUtil.create('div', 'map-search-host', map.getContainer());
        mapSearchHost.id = 'mapSearchHost';
        mapSearchHost.setAttribute('aria-label', 'Search map');
        L.DomEvent.disableClickPropagation(mapSearchHost);
        L.DomEvent.disableScrollPropagation(mapSearchHost);

        var baseMaps = {
            "Google Satellite": layer_GoogleSatHybrid_1,
            "Open Street Map": layer_OpenStreetMap_0
        };

        map.on('baselayerchange', function(e) {
            var toLayer = e.layer;
            var fromLayer = toLayer === layer_OpenStreetMap_0
                ? layer_GoogleSatHybrid_1
                : layer_OpenStreetMap_0;

            if (!map.hasLayer(fromLayer) && activeBaseLayer === fromLayer) {
                map.addLayer(fromLayer);
                fromLayer.setOpacity(1);
            }
            crossFadeBaseLayer(toLayer);
            applyBasemapVisualMode(toLayer === layer_GoogleSatHybrid_1);
            updateBasemapLabelTogglePanels();
            refreshSiteNameLabelsBurst();
        });

        var overlays = {
            '<img src="legend/ICBCSites_6.png" /> ICBC Sites': layer_icbcAllSites,
            '<img src="legend/CMS_5.png" /> Challenge Ministries': layer_CMS_5,
            '<img src="legend/Roads_4.png" /> Roads': layer_Roads_4,
            '<img src="legend/7kmCatchmentArea_3.png" /> 7km Catchment Area': layer_7kmCatchmentAll,
            'Eswatini Regions<br /><table><tr><td style="text-align: center;"><img src="legend/eSwatiniRegions_2_Hhohho0.png" /></td><td>Hhohho</td></tr><tr><td style="text-align: center;"><img src="legend/eSwatiniRegions_2_Lubombo1.png" /></td><td>Lubombo</td></tr><tr><td style="text-align: center;"><img src="legend/eSwatiniRegions_2_Manzini2.png" /></td><td>Manzini</td></tr><tr><td style="text-align: center;"><img src="legend/eSwatiniRegions_2_Shiselweni3.png" /></td><td>Shiselweni</td></tr></table>': layer_eSwatiniRegions_2
        };
        overlays['<img src="' + resolvePublicAssetUrl('markers/house-icon.svg') +
            '" height="14"/> Bubele Care'] = layer_HomeSites;

        var legendControl = L.control.layers(baseMaps, overlays, { collapsed: false });
        legendControl.addTo(map);

        initMapSearchControl(mapSearchHost);
        loadStaffSearchIndex();
        loadSiteProfilesSeed();
        loadSiteWeeklyMetricsSeed();
        loadRainfallSeed();

        var legendToggleBtn = document.getElementById('legendToggle');
        var layersControl = legendControl.getContainer();

        var toggleGoogleRoads = null;
        var toggleGooglePlaces = null;
        var googleLabelOptionsEl = null;
        var googleMapLabelsOn = false;

        function syncGoogleMapLabels() {
            if (!toggleGoogleRoads || !toggleGooglePlaces) return;
            var showLabels = toggleGoogleRoads.checked || toggleGooglePlaces.checked;
            if (showLabels === googleMapLabelsOn) return;
            googleMapLabelsOn = showLabels;
            layer_GoogleSatHybrid_1.setUrl(showLabels ? GOOGLE_TILE_HYBRID : GOOGLE_TILE_SAT);
        }

        function isGoogleBasemapActive() {
            return activeBaseLayer === layer_GoogleSatHybrid_1;
        }

        function updateBasemapLabelTogglePanels() {
            if (googleLabelOptionsEl) {
                googleLabelOptionsEl.classList.toggle('is-hidden', !isGoogleBasemapActive());
            }
        }

        function injectBasemapLabelToggles() {
            if (!layersControl || layersControl.querySelector('.basemap-label-options')) return;

            var baseSection = layersControl.querySelector('.leaflet-control-layers-base');
            var insertBefore = layersControl.querySelector('.leaflet-control-layers-overlays') ||
                layersControl.querySelector('.leaflet-control-layers-separator');
            if (!insertBefore && baseSection && baseSection.parentNode) {
                insertBefore = baseSection.nextSibling;
            }
            if (!insertBefore) return;

            googleLabelOptionsEl = document.createElement('div');
            googleLabelOptionsEl.className = 'basemap-label-options';
            googleLabelOptionsEl.innerHTML =
                '<div class="basemap-label-options-title">Google satellite labels</div>' +
                '<p class="basemap-label-options-hint">Off by default so ICBC site names stay clear.</p>' +
                '<label><input type="checkbox" class="js-google-roads"> Road names</label>' +
                '<label><input type="checkbox" class="js-google-places"> Place names</label>';

            layersControl.insertBefore(googleLabelOptionsEl, insertBefore);

            toggleGoogleRoads = googleLabelOptionsEl.querySelector('.js-google-roads');
            toggleGooglePlaces = googleLabelOptionsEl.querySelector('.js-google-places');

            [toggleGoogleRoads, toggleGooglePlaces].forEach(function (input) {
                if (input) input.addEventListener('change', syncGoogleMapLabels);
            });

            L.DomEvent.disableClickPropagation(googleLabelOptionsEl);
            L.DomEvent.disableScrollPropagation(googleLabelOptionsEl);
        }

        if (legendToggleBtn && layersControl) {
            legendToggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            layersControl.classList.toggle('show');
            });
        }

        map.on('click', function() {
            if (window.innerWidth <= 768 && layersControl && layersControl.classList.contains('show')) {
                layersControl.classList.remove('show');
            }
        });

        if (layersControl) {
            L.DomEvent.on(layersControl, 'click', function(e) {
                L.DomEvent.stopPropagation(e);
            });
            layersControl.addEventListener('click', function(e) {
            if (window.innerWidth <= 768 &&
                (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') &&
                !e.target.closest('.basemap-label-options')) {
                setTimeout(function() {
                    layersControl.classList.remove('show');
                }, 300);
            }
            });
        }

        var i = 0;
        layer_Roads_4.eachLayer(function(layer) {
            layer.bindTooltip((layer.feature.properties['ROADNO'] !== null ? String('<div>' + layer.feature.properties['ROADNO']) + '</div>' : ''), {permanent: true, offset: [-0, -16], className: 'css_Roads_4'});
            labels.push(layer);
            totalMarkers += 1;
            layer.added = true;
            addLabel(layer, i);
            i++;
        });

        var i = 0;
        layer_CMS_5.eachLayer(function(layer) {
            var cmsLabel = 'Challenge Ministries';
            bindPermanentSiteTooltip(
                layer,
                '<div>' + cmsLabel + '</div>',
                cmsSiteTooltipOptions(),
                'cms',
                layer.feature.properties
            );
            labels.push(layer);
            totalMarkers += 1;
            layer.added = true;
            addLabel(layer, i);
            i++;
        });

        var i = 0;
        layer_ICBCSites_6.eachLayer(function(layer) {
            var siteName = layer.feature.properties['Site Name'];
            bindPermanentSiteTooltip(
                layer,
                siteName != null ? String('<div>' + siteName + '</div>') : '',
                icbcSiteTooltipOptions(),
                'icbc',
                layer.feature.properties
            );
            labels.push(layer);
            totalMarkers += 1;
            layer.added = true;
            addLabel(layer, i);
            i++;
        });

        refreshSiteNameLabels();
        injectBasemapLabelToggles();

        applyBasemapVisualMode(true);
        syncGoogleMapLabels();
        updateBasemapLabelTogglePanels();

        if (layersControl) {
            var baseRadios = layersControl.querySelectorAll('.leaflet-control-layers-base input[type="radio"]');
            if (baseRadios.length) {
                baseRadios[0].checked = true;
            }
        }

        map.whenReady(function () {
            injectBasemapLabelToggles();
            syncGoogleMapLabels();
            updateBasemapLabelTogglePanels();
            refreshSiteNameLabelsBurst();
            mergeAllIcbcSites();
        });

        var labelResetTimer = null;
        function scheduleLabelReset() {
            if (labelResetTimer) clearTimeout(labelResetTimer);
            labelResetTimer = setTimeout(function () {
                refreshSiteNameLabels();
            }, 100);
        }

        function isManagedLabelOverlay(layer) {
            return layer === layer_eSwatiniRegions_2 ||
                layer === layer_Roads_4 ||
                layer === layer_CMS_5 ||
                layer === layer_ICBCSites_6 ||
                layer === layer_icbcExtraSites ||
                layer === layer_icbcAllSites;
        }

        map.on('zoomend', scheduleLabelReset);
        map.on('moveend', scheduleLabelReset);
        map.on('overlayadd', function (e) {
            if (isManagedLabelOverlay(e.layer)) scheduleLabelReset();
        });
        map.on('overlayremove', function (e) {
            if (isManagedLabelOverlay(e.layer)) scheduleLabelReset();
        });

        window.openSiteSidebar = openSiteSidebar;
        window.scheduleFlyToMarker = scheduleFlyToMarker;
        window.slugifyForApi = slugifyForApi;
        </script>
    </body>
</html>
