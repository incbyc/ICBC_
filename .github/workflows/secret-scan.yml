name: Secret scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run local secret scanner
        run: python scripts/check_secrets.py
